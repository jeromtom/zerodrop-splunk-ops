# DropWatch scheduled detector alerts.
#
# Each saved search runs natively in Splunk on a cron schedule and fires a
# real Splunk alert when its condition trips. These mirror the deterministic
# detectors in the in-app DropWatch agent (lib/dropwatch/analyze.ts) so the
# same drop-health logic runs server-side, continuously, even when no one has
# the /ops dashboard open.
#
# All searches run over: index=zerodrop sourcetype=zerodrop:telemetry
# Event field: event (claim|hold_create|hold_expiry|oversell_reject|waitlist_add|checkout)
# Other fields: dropId, dropName, ip, position, buyer, latencyMs
#
# Webhook alerts POST the result set to the DropWatch automation endpoint. Set
# action.webhook.param.url to your ZeroDrop deployment, e.g.
#   https://<your-host>/api/ops/scan
# Leave it blank to disable the webhook and rely on Splunk's own alert tracking.


# =====================================================================
# 1. Stampede onset — claim-rate spike vs rolling baseline
# =====================================================================
# Mirrors the agent's "stampede" rule: peak claims/min >= 20 AND
# peak/baseline ratio >= 4. We compute a per-minute claim rate over the last
# 30 minutes, take the median of the earlier minutes as the baseline, and
# compare the most recent minute's rate against it.

[DropWatch - Stampede onset]
search = index=zerodrop sourcetype=zerodrop:telemetry event=claim \
| bin _time span=1m \
| stats count as claims by _time dropId \
| eventstats median(claims) as baseline_rate, max(claims) as peak_rate by dropId \
| eval baseline_rate=if(baseline_rate<1,1,baseline_rate) \
| eval stampede_ratio=round(peak_rate/baseline_rate,2) \
| stats max(stampede_ratio) as stampede_ratio, max(peak_rate) as peak_claims_per_min, latest(baseline_rate) as baseline_claims_per_min by dropId \
| where peak_claims_per_min>=20 AND stampede_ratio>=4 \
| eval severity=if(stampede_ratio>=8,"critical","high") \
| sort - stampede_ratio
dispatch.earliest_time = -30m
dispatch.latest_time = now
cron_schedule = */2 * * * *
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 5m
alert.digest_mode = 1
action.webhook = 1
action.webhook.param.url =
description = Claim rate spiked far above the rolling baseline for a drop. A flash drop is going viral and stock is draining fast; consider enabling the queue throttle.
request.ui_dispatch_app = dropwatch


# =====================================================================
# 2. Oversell-bot cluster — one /24 subnet dominates oversell rejects
# =====================================================================
# Mirrors the agent's "oversell-bot" rule: >= 10 oversell_reject events where
# the top /24 subnet alone produces >= 25% of them. Repeated post-sellout
# claim attempts concentrated in one subnet is the signature of checkout bots.
# (No oversell actually occurs — the DynamoDB conditional guard holds.)

[DropWatch - Oversell-bot subnet cluster]
search = index=zerodrop sourcetype=zerodrop:telemetry event=oversell_reject \
| eval subnet=replace(ip,"(\d+\.\d+\.\d+)\.\d+","\1.0/24") \
| eventstats count as total_rejects by dropId \
| stats count as subnet_rejects, dc(ip) as distinct_ips, max(total_rejects) as total_rejects by dropId subnet \
| eval subnet_share=round(subnet_rejects/total_rejects,2) \
| where total_rejects>=10 AND subnet_share>=0.25 \
| eval severity="high", bot_signal="LIKELY BOT CLUSTER" \
| sort - subnet_rejects \
| table dropId subnet subnet_rejects distinct_ips total_rejects subnet_share severity bot_signal
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */2 * * * *
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.track = 1
alert.severity = 4
alert.suppress = 1
alert.suppress.period = 5m
alert.suppress.fields = dropId,subnet
alert.digest_mode = 1
action.webhook = 1
action.webhook.param.url =
description = One /24 subnet dominates post-sellout oversell-reject attempts for a drop. Signature of automated checkout bots; flag the subnet for soft-block / CAPTCHA.
request.ui_dispatch_app = dropwatch


# =====================================================================
# 3. Hold-expiry storm — abandoned holds bouncing back to stock
# =====================================================================
# Mirrors the agent's "hold-expiry-storm" rule: >= 10 hold_expiry events AND
# expiry rate (expiries / holds created) >= 0.3 in the window.

[DropWatch - Hold-expiry storm]
search = index=zerodrop sourcetype=zerodrop:telemetry (event=hold_create OR event=hold_expiry) \
| stats count(eval(event="hold_expiry")) as hold_expiries, count(eval(event="hold_create")) as holds_created by dropId \
| eval holds_created=if(holds_created<1,1,holds_created) \
| eval hold_expiry_rate=round(hold_expiries/holds_created,2) \
| where hold_expiries>=10 AND hold_expiry_rate>=0.3 \
| eval severity="medium" \
| sort - hold_expiries \
| table dropId hold_expiries holds_created hold_expiry_rate severity
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.track = 1
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 10m
alert.suppress.fields = dropId
alert.digest_mode = 1
description = Holds are expiring back to inventory at an abnormal rate after the rush. Buyers are abandoning carts; consider extending the hold window for the drop.
request.ui_dispatch_app = dropwatch


# =====================================================================
# 4. Waitlist conversion collapse — demand captured but not converted
# =====================================================================
# Mirrors the agent's "waitlist-collapse" rule: >= 10 waitlist_add events,
# at least 1 checkout, and conversion (checkouts / (checkouts + waitlist_adds))
# below 0.3.

[DropWatch - Waitlist conversion collapse]
search = index=zerodrop sourcetype=zerodrop:telemetry (event=waitlist_add OR event=checkout) \
| stats count(eval(event="waitlist_add")) as waitlist_adds, count(eval(event="checkout")) as checkouts by dropId \
| eval waitlist_conversion=round(checkouts/(checkouts+waitlist_adds),2) \
| where waitlist_adds>=10 AND checkouts>0 AND waitlist_conversion<0.3 \
| eval severity="low" \
| sort - waitlist_adds \
| table dropId waitlist_adds checkouts waitlist_conversion severity
dispatch.earliest_time = -30m
dispatch.latest_time = now
cron_schedule = */10 * * * *
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.track = 1
alert.severity = 2
alert.suppress = 1
alert.suppress.period = 30m
alert.suppress.fields = dropId
alert.digest_mode = 1
description = Lots of buyers waitlisted but few are converting to checkout. Demand is being captured but not realized; trigger a restock-notify campaign to the waitlist.
request.ui_dispatch_app = dropwatch


# =====================================================================
# 5. Generic rate anomaly — any event type spikes vs its own baseline
# =====================================================================
# A general-purpose statistical detector independent of the hand-tuned rules
# above. For every event type, compute per-minute counts over the last hour,
# derive a mean + stddev baseline from the trailing window, and flag the most
# recent minute when it exceeds baseline by 3 standard deviations (z-score).

[DropWatch - Generic rate anomaly]
search = index=zerodrop sourcetype=zerodrop:telemetry \
| bin _time span=1m \
| stats count as events_per_min by _time event dropId \
| eventstats avg(events_per_min) as mean_rate, stdev(events_per_min) as stdev_rate by event dropId \
| eval stdev_rate=if(stdev_rate<1,1,stdev_rate) \
| eval z_score=round((events_per_min-mean_rate)/stdev_rate,2) \
| where _time>=relative_time(now(),"-2m") AND z_score>=3 AND events_per_min>=10 \
| eval severity=if(z_score>=5,"high","medium") \
| sort - z_score \
| table _time dropId event events_per_min mean_rate z_score severity
dispatch.earliest_time = -60m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.track = 1
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 10m
alert.suppress.fields = dropId,event
alert.digest_mode = 1
description = A telemetry event type spiked more than 3 standard deviations above its own rolling baseline. Generic early-warning signal for any unmodeled surge.
request.ui_dispatch_app = dropwatch


# =====================================================================
# 6. Latency degradation — write latency rising under load
# =====================================================================
# Watches the DynamoDB write latency carried on each event (latencyMs). Fires
# when the 95th-percentile write latency over the window crosses 250ms, which
# under a stampede is the leading indicator of tail-latency pain before any
# user-facing error shows up.

[DropWatch - Write latency degradation]
search = index=zerodrop sourcetype=zerodrop:telemetry latencyMs=* \
| stats perc95(latencyMs) as p95_latency_ms, avg(latencyMs) as avg_latency_ms, count as writes by dropId \
| eval p95_latency_ms=round(p95_latency_ms,0), avg_latency_ms=round(avg_latency_ms,0) \
| where writes>=20 AND p95_latency_ms>=250 \
| eval severity=if(p95_latency_ms>=500,"high","medium") \
| sort - p95_latency_ms \
| table dropId writes avg_latency_ms p95_latency_ms severity
dispatch.earliest_time = -15m
dispatch.latest_time = now
cron_schedule = */5 * * * *
enableSched = 1
counttype = number of events
relation = greater than
quantity = 0
alert_type = number of events
alert_comparator = greater than
alert_threshold = 0
alert.track = 1
alert.severity = 3
alert.suppress = 1
alert.suppress.period = 10m
alert.suppress.fields = dropId
alert.digest_mode = 1
description = 95th-percentile DynamoDB write latency is elevated under load. Leading indicator of tail-latency pain before user-facing errors appear.
request.ui_dispatch_app = dropwatch
