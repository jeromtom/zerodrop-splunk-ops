# DropWatch — Agentic Drop Observability
# Splunk app packaging for ZeroDrop flash-drop telemetry.
#
# Telemetry arrives via HEC into index=zerodrop, sourcetype=zerodrop:telemetry.
# This app ships the dashboard plus a set of scheduled detector alerts that
# mirror, natively in Splunk, the same logic the in-app DropWatch agent runs
# (see lib/dropwatch/analyze.ts in the ZeroDrop repo).

[install]
is_configured = true
state = enabled

[ui]
is_visible = true
label = DropWatch — Agentic Drop Observability

[launcher]
author = ZeroDrop / DropWatch
description = Agentic observability for flash drops. Scheduled detectors for stampede onset, oversell-bot clusters, hold-expiry storms, waitlist collapse, and generic rate anomalies over zerodrop telemetry.
version = 1.0.0

[package]
id = dropwatch
check_for_updates = false

[id]
name = dropwatch
version = 1.0.0
