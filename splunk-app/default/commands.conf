# DropWatch custom search command.
#   index=zerodrop sourcetype=zerodrop:telemetry | dropwatch
# Runs DropWatch's agentic detection (drop-health, stampede, hold-expiry storm,
# and the OWASP OAT-005 scalping-bot security finding) natively in Splunk.
[dropwatch]
filename = dropwatch.py
chunked = true
python.version = python3
